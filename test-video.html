<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Test</title>
    <style>
        body {
            background: #000;
            padding: 50px;
        }
        .video-box {
            width: 400px;
            height: 400px;
            background: #333;
            margin: 20px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <h1 style="color: white;">Video Test</h1>
    
    <div class="video-box">
        <iframe 
            src="https://www.youtube.com/embed/KTbrq0Ew1-g" 
            title="Test Video" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
    </div>

    <p style="color: white;">If you see video above, YouTube works. If black box, there's a network/YouTube issue.</p>
</body>
</html>
